<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>OrthoHandTherapyBeta | Patient Access</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;500;600;700&family=Source+Serif+4:opsz,wght@8..60,500;8..60,600;8..60,700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css?v=20" />
  </head>
  <body>
    <header class="top-nav">
      <a class="nav-link" href="./index.html">Home</a>
    </header>
    <main class="screen screen-centered">
      <section class="card simple-card">
        <p class="eyebrow">Patient access</p>
        <h1>Enter your patient ID</h1>
        <p class="support-copy">
          Your clinician will give you a patient ID after they build your plan. Enter it here to load your assigned checklist and save progress under that ID.
        </p>
        <form class="auth-form" id="patient-access-form">
          <label class="builder-field">
            <span>Patient ID</span>
            <input id="patient-id-input" type="text" placeholder="HND-AB12CD" />
          </label>
          <label class="remember-choice">
            <input id="patient-remember" type="checkbox" />
            <span>Remember me on this device</span>
          </label>
          <button class="primary-button large-button" type="submit">Open patient plan</button>
        </form>
        <p class="completion-message" id="patient-access-message"></p>
      </section>
    </main>

    <script src="data.js?v=20"></script>
    <script src="api-client.js?v=20"></script>
    <script src="patient-access.js?v=20"></script>
  </body>
</html>
