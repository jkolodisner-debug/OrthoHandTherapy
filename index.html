<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>OrthoHandTherapyBeta</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;500;600;700&family=Source+Serif+4:opsz,wght@8..60,500;8..60,600;8..60,700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css?v=24" />
  </head>
  <body>
    <main class="screen screen-centered intro-screen">
      <section class="card intro-card">
        <div class="intro-logo-stack">
          <img class="brand-logo-image intro-logo" src="./assets/ua-logo.png" alt="University of Arizona logo" />
          <p class="eyebrow intro-eyebrow">University of Arizona Health Sciences</p>
        </div>
        <h1 class="intro-title">OrthoHandTherapyBeta</h1>
        <p class="intro-subtitle">Follow your hand therapy plan, track daily recovery, and stay on pace with the exercises your clinician assigned for you.</p>
        <div class="intro-role-actions">
          <button class="nav-link large-button intro-role-button intro-role-button-patient" type="button" data-role="patient">
            Get started
          </button>
        </div>
        <button class="intro-clinician-link" type="button" data-role="clinician">
          If you are a clinician, click here
        </button>
      </section>
    </main>

    <div class="welcome-sheet-overlay hidden" id="welcome-sheet-overlay" aria-live="polite">
      <section class="welcome-sheet" id="welcome-sheet">
        <span class="sheet-pill" id="sheet-pill">Clinician</span>
        <h2 class="sheet-title" id="sheet-title">Before you continue</h2>
        <p class="sheet-copy" id="sheet-copy"></p>
        <div class="sheet-actions">
          <button class="nav-link large-button" id="sheet-back-button" type="button">Back</button>
          <button class="primary-button large-button" id="sheet-continue-button" type="button">Continue</button>
        </div>
      </section>
    </div>

    <script src="data.js?v=24"></script>
    <script src="welcome.js?v=24"></script>
  </body>
</html>
