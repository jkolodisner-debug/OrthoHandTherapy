<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>Clinician Sign In</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;500;600;700&family=Source+Serif+4:opsz,wght@8..60,500;8..60,600;8..60,700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css?v=11" />
  </head>
  <body>
    <header class="top-nav">
      <a class="nav-link" href="./clinician-auth.html">Back</a>
    </header>
    <main class="screen screen-centered">
      <section class="card simple-card">
        <p class="eyebrow">Clinician sign in</p>
        <h1>Sign in</h1>
        <p class="support-copy">Enter the clinician email and password saved on this device.</p>
        <form class="auth-form" id="signin-form">
          <label class="builder-field">
            <span>Email</span>
            <input id="signin-email" type="email" />
          </label>
          <label class="builder-field">
            <span>Password</span>
            <input id="signin-password" type="password" />
          </label>
          <button class="primary-button large-button" type="submit">Open clinician portal</button>
        </form>
        <p class="completion-message" id="signin-message"></p>
      </section>
    </main>

    <script src="data.js?v=13"></script>
    <script src="api-client.js?v=13"></script>
    <script src="clinician-signin.js?v=13"></script>
  </body>
</html>
