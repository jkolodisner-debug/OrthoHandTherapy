<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>OrthoHandTherapyBeta | Account Details</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;500;600;700&family=Source+Serif+4:opsz,wght@8..60,500;8..60,600;8..60,700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css?v=16" />
  </head>
  <body>
    <header class="top-nav">
      <a class="nav-link" id="account-top-link" href="./clinician-auth.html">Back</a>
    </header>
    <main class="screen screen-centered">
      <section class="card simple-card">
        <p class="eyebrow" id="account-eyebrow">Create account</p>
        <h1 id="account-title">Create clinician account</h1>
        <p class="support-copy" id="account-support-copy">
          This prototype can create a clinician account with first name, last name, email, and password.
        </p>
        <form class="auth-form" id="account-form">
          <label class="builder-field">
            <span>First name</span>
            <input id="first-name-input" type="text" />
          </label>
          <label class="builder-field">
            <span>Last name</span>
            <input id="last-name-input" type="text" />
          </label>
          <label class="builder-field">
            <span>Email</span>
            <input id="email-input" type="email" />
          </label>
          <label class="builder-field">
            <span>Password</span>
            <div class="password-field-row">
              <input id="password-input" type="password" />
              <button class="nav-link inline-button password-toggle-button" id="password-toggle-button" type="button">Show</button>
            </div>
          </label>
          <button class="primary-button large-button" id="account-submit-button" type="submit">Create clinician account</button>
        </form>
        <p class="completion-message" id="account-message"></p>
        <section class="builder-section hidden" id="reset-password-section">
          <div class="builder-heading">
            <div>
              <span class="stat-label">Reset password</span>
              <h2>Set a new password</h2>
            </div>
          </div>
          <form class="auth-form" id="reset-password-form">
            <label class="builder-field">
              <span>New password</span>
              <div class="password-field-row">
                <input id="new-password-input" type="password" />
                <button class="nav-link inline-button password-toggle-button" id="new-password-toggle" type="button">Show</button>
              </div>
            </label>
            <label class="builder-field">
              <span>Confirm new password</span>
              <div class="password-field-row">
                <input id="confirm-password-input" type="password" />
                <button class="nav-link inline-button password-toggle-button" id="confirm-password-toggle" type="button">Show</button>
              </div>
            </label>
            <button class="primary-button large-button" id="reset-password-button" type="submit">Save new password</button>
          </form>
          <p class="completion-message" id="reset-password-message"></p>
        </section>
        <div class="portal-grid compact-grid">
          <a class="nav-link large-button" id="account-secondary-link" href="./clinician-auth.html">Clinician access</a>
          <a class="nav-link large-button" href="./index.html">Return home</a>
        </div>
      </section>
    </main>

    <script src="data.js?v=17"></script>
    <script src="api-client.js?v=17"></script>
    <script src="account.js?v=17"></script>
  </body>
</html>
